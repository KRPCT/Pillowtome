<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>sandbox-test-srcdoc</title></head>
<body>
<div id="out">PENDING</div>
<iframe id="f" sandbox="allow-same-origin allow-popups" srcdoc="<html><body><p id='t'>hello world sandbox selection test</p></body></html>" style="width:400px;height:200px"></iframe>
<script>
const out = [];
const log = (m) => { out.push(m); document.getElementById('out').textContent = out.join(' | '); };
const iframe = document.getElementById('f');
iframe.addEventListener('load', () => {
  try {
    const win = iframe.contentWindow;
    const doc = iframe.contentDocument;
    log('loaded win=' + !!win + ' doc=' + !!doc);
    if (!doc) { log('DONE'); return; }

    doc.addEventListener('pointerup', () => log('pointerup-fired'));
    doc.addEventListener('selectionchange', () => log('selectionchange-fired'));

    let winTimer = false;
    try {
      win.setTimeout(() => { winTimer = true; log('win.setTimeout-FIRED'); }, 50);
      log('win.setTimeout-called-ok');
    } catch (e) { log('win.setTimeout-THREW:' + e.name); }

    try {
      doc.defaultView.setTimeout(() => log('doc.defaultView.setTimeout-FIRED'), 50);
      log('doc.defaultView.setTimeout-called-ok');
    } catch (e) { log('doc.defaultView.setTimeout-THREW:' + e.name); }

    setTimeout(() => {
      log('parent-timer winTimer=' + winTimer);
      try {
        const p = doc.getElementById('t').firstChild;
        const sel = win.getSelection();
        sel.setBaseAndExtent(p, 0, p, 5);
        log('sel text="' + sel.toString() + '" collapsed=' + sel.isCollapsed + ' ranges=' + sel.rangeCount);
        const r = sel.getRangeAt(0);
        log('rects=' + r.getClientRects().length);
      } catch (e) { log('selection-THREW:' + e.name); }
      try {
        doc.dispatchEvent(new win.PointerEvent('pointerup', {bubbles: true}));
      } catch (e) { log('dispatch-THREW:' + e.name); }
      setTimeout(() => log('DONE'), 200);
    }, 300);
  } catch (e) { log('onload-THREW:' + e.name + ':' + e.message); }
});
</script>
</body>
</html>
