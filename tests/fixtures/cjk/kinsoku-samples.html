<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <title>Pillowtome kinsoku samples</title>
    <style>
      body {
        font-family: "PillowBundledCJK", system-ui, "PingFang SC", "Microsoft YaHei",
          sans-serif;
        font-size: 18px;
        line-height: 1.75;
        line-break: strict;
        word-break: normal;
        overflow-wrap: break-word;
        margin: 24px;
        max-width: 16em; /* narrow to force wraps near punctuation */
      }
      p {
        text-indent: 2em;
        margin: 0 0 1em;
      }
    </style>
  </head>
  <body>
    <p>
      行首禁则样本：句号应避免落在行首。比如这段文字会反复出现标点，。，、；：？！以及闭括号）」』】）等，用于视觉检查。
    </p>
    <p>
      行尾禁则样本：「开引号与《书名号》【着重号】（括号 不应孤悬行尾。「再测一次」与『嵌套』。
    </p>
    <p>
      混排边界：中文ABC混排、数字123与中文相邻时的断行，以及「引用」后接Latin。
    </p>
  </body>
</html>
